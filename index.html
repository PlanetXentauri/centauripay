<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0b0d12" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="CentauriPay" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<title>CentauriPay — Centauri Family Bills</title>
<style>
  :root {
    --bg-grad-start: #0b0d12;
    --bg-grad-end: #131726;
    --panel: #161922;
    --panel-2: #1c2030;
    --panel-border: #262b3a;
    --text: #e8eaf0;
    --text-dim: #8b91a3;
    --text-faint: #565a6b;
    --accent-1: #6366f1;
    --accent-2: #8b5cf6;
    --prio-1: #C97064;
    --prio-2: #D4A55D;
    --prio-3: #7DA87D;
    --danger: #ef4444;
    --success: #4ade80;
    --m-dreco: #6366f1;
    --m-brittany: #ec4899;
    --m-anabella: #a855f7;
    --m-orion: #22d3ee;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: linear-gradient(135deg, var(--bg-grad-start) 0%, var(--bg-grad-end) 100%);
    background-attachment: fixed;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 15px;
    line-height: 1.45;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  button, input, textarea, select {
    font-family: inherit; font-size: inherit; color: inherit;
  }
  button { cursor: pointer; }
  input, textarea, select {
    background: var(--panel-2); border: 1px solid var(--panel-border);
    border-radius: 10px; padding: 10px 12px; color: var(--text);
    outline: none; transition: border-color 0.15s;
    width: 100%;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent-1); }
  textarea { min-height: 70px; resize: vertical; }

  /* Layout */
  .container { max-width: 760px; margin: 0 auto; padding: 16px 14px 100px; }
  header.app-header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin-bottom: 14px;
  }
  h1 {
    margin: 0; font-size: 26px; letter-spacing: -0.02em; font-weight: 900;
    background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    line-height: 1;
  }
  .app-logo {
    display: block; height: 30px; width: auto; max-width: 100%;
    image-rendering: pixelated; image-rendering: crisp-edges;
  }
  .app-title-wrap { display: flex; flex-direction: column; gap: 2px; }
  .tagline {
    font-size: 11px; color: var(--text-faint); letter-spacing: 0.08em;
    text-transform: uppercase; font-weight: 600;
  }
  .sync-status {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-dim);
  }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-faint); }
  .settings-btn {
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 999px; padding: 6px 10px; font-size: 16px;
    line-height: 1; margin-left: 8px;
    transition: background 0.15s, border-color 0.15s;
  }
  .settings-btn:hover { border-color: var(--accent-1); }
  .settings-btn.active {
    background: rgba(255,255,255,0.10); border-color: rgba(255,255,255,0.30);
  }
  .sync-dot.connected { background: var(--success); }
  .sync-dot.error { background: var(--danger); }

  /* Tabs */
  nav.tabs {
    display: flex; gap: 4px; margin-bottom: 14px; overflow-x: auto;
    -webkit-overflow-scrolling: touch; padding-bottom: 4px;
  }
  nav.tabs button {
    background: var(--panel); color: var(--text-dim);
    border: 1px solid var(--panel-border); border-radius: 999px;
    padding: 7px 14px; font-size: 13px; white-space: nowrap;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  /* Colored tabs — each has its own hue */
  nav.tabs button.tab-today {
    color: #a5b4fc; border-color: rgba(99,102,241,0.30);
    background: rgba(99,102,241,0.06);
  }
  nav.tabs button.tab-today.active {
    color: #e0e7ff; background: rgba(99,102,241,0.28);
    border-color: rgba(99,102,241,0.7);
    box-shadow: 0 0 0 1px rgba(99,102,241,0.25);
  }
  nav.tabs button.tab-upcoming {
    color: #facc15; border-color: rgba(212,165,93,0.35);
    background: rgba(212,165,93,0.06);
  }
  nav.tabs button.tab-upcoming.active {
    color: #fde68a; background: rgba(212,165,93,0.28);
    border-color: rgba(212,165,93,0.75);
    box-shadow: 0 0 0 1px rgba(212,165,93,0.25);
  }
  nav.tabs button.tab-all {
    color: #c4b5fd; border-color: rgba(139,92,246,0.35);
    background: rgba(139,92,246,0.06);
  }
  nav.tabs button.tab-all.active {
    color: #ede9fe; background: rgba(139,92,246,0.28);
    border-color: rgba(139,92,246,0.75);
    box-shadow: 0 0 0 1px rgba(139,92,246,0.25);
  }
  nav.tabs button.tab-done {
    color: #86efac; border-color: rgba(74,222,128,0.35);
    background: rgba(74,222,128,0.06);
  }
  nav.tabs button.tab-done.active {
    color: #dcfce7; background: rgba(74,222,128,0.28);
    border-color: rgba(74,222,128,0.75);
    box-shadow: 0 0 0 1px rgba(74,222,128,0.25);
  }
  nav.tabs button.tab-settings.active {
    color: var(--text); background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.25);
  }

  /* ====== Family member pills ====== */
  nav.tabs.member-tabs { margin-bottom: 10px; }
  nav.tabs button.tab-member-all {
    color: #c4b5fd; border-color: rgba(139,92,246,0.35);
    background: rgba(139,92,246,0.06);
  }
  nav.tabs button.tab-member-all.active {
    color: #ede9fe; background: rgba(139,92,246,0.28);
    border-color: rgba(139,92,246,0.75);
    box-shadow: 0 0 0 1px rgba(139,92,246,0.25);
  }
  nav.tabs button.tab-m-dreco {
    color: #a5b4fc; border-color: rgba(99,102,241,0.30); background: rgba(99,102,241,0.06);
  }
  nav.tabs button.tab-m-dreco.active {
    color: #e0e7ff; background: rgba(99,102,241,0.28);
    border-color: rgba(99,102,241,0.7); box-shadow: 0 0 0 1px rgba(99,102,241,0.25);
  }
  nav.tabs button.tab-m-brittany {
    color: #f9a8d4; border-color: rgba(236,72,153,0.30); background: rgba(236,72,153,0.06);
  }
  nav.tabs button.tab-m-brittany.active {
    color: #fce7f3; background: rgba(236,72,153,0.28);
    border-color: rgba(236,72,153,0.7); box-shadow: 0 0 0 1px rgba(236,72,153,0.25);
  }
  nav.tabs button.tab-m-anabella {
    color: #d8b4fe; border-color: rgba(168,85,247,0.30); background: rgba(168,85,247,0.06);
  }
  nav.tabs button.tab-m-anabella.active {
    color: #f3e8ff; background: rgba(168,85,247,0.28);
    border-color: rgba(168,85,247,0.7); box-shadow: 0 0 0 1px rgba(168,85,247,0.25);
  }
  nav.tabs button.tab-m-orion {
    color: #67e8f9; border-color: rgba(34,211,238,0.30); background: rgba(34,211,238,0.06);
  }
  nav.tabs button.tab-m-orion.active {
    color: #cffafe; background: rgba(34,211,238,0.28);
    border-color: rgba(34,211,238,0.7); box-shadow: 0 0 0 1px rgba(34,211,238,0.25);
  }
  .member-chip {
    padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600;
    letter-spacing: 0.02em;
  }
  .member-chip.mc-dreco { background: rgba(99,102,241,0.15); color: #a5b4fc; }
  .member-chip.mc-brittany { background: rgba(236,72,153,0.15); color: #f9a8d4; }
  .member-chip.mc-anabella { background: rgba(168,85,247,0.15); color: #d8b4fe; }
  .member-chip.mc-orion { background: rgba(34,211,238,0.15); color: #67e8f9; }
  .member-chip.mc-family { background: rgba(255,255,255,0.08); color: var(--text-dim); }

  /* Quick add */
  .quick-add {
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 14px; padding: 12px; margin-bottom: 16px;
    display: flex; gap: 8px; align-items: center;
  }
  .quick-add input { flex: 1; }
  .quick-add button.primary {
    background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
    border: none; color: white; font-weight: 600;
    padding: 11px 16px; border-radius: 10px; white-space: nowrap;
  }
  .quick-add button.primary:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Task card */
  .task {
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 14px; padding: 12px 14px; margin-bottom: 10px;
    transition: border-color 0.15s;
  }
  .task.done { opacity: 0.55; }
  .task.expanded { border-color: rgba(99,102,241,0.35); }
  .task-head { display: flex; align-items: flex-start; gap: 12px; }
  .check-btn {
    flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--text-dim); background: transparent;
    padding: 0; display: flex; align-items: center; justify-content: center;
    margin-top: 2px;
  }
  .check-btn.done { background: var(--success); border-color: var(--success); }
  .check-btn.done::after { content: "✓"; color: #0b0d12; font-weight: bold; font-size: 13px; }
  .task-body { flex: 1; min-width: 0; }
  .task-title {
    font-size: 15px; color: var(--text); cursor: pointer;
    word-break: break-word;
  }
  .task-title.done { text-decoration: line-through; color: var(--text-dim); }
  .task-meta {
    font-size: 12px; color: var(--text-dim); margin-top: 4px;
    display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
  }
  .chip {
    padding: 2px 8px; border-radius: 999px; font-size: 11px;
    background: rgba(255,255,255,0.06); color: var(--text-dim);
  }
  .badge {
    flex-shrink: 0; padding: 3px 9px; border-radius: 999px;
    font-size: 11px; font-weight: 700; color: #1a1a1a;
  }
  .badge.p1 { background: var(--prio-1); }
  .badge.p2 { background: var(--prio-2); }
  .badge.p3 { background: var(--prio-3); }
  .deadline-warning { color: var(--prio-1); font-weight: 600; }
  .deadline-soon { color: var(--prio-2); font-weight: 600; }
  .meta-icons { display: flex; gap: 8px; color: var(--text-faint); font-size: 11px; }

  /* Expanded task details */
  .task-details {
    margin-top: 12px; padding-top: 12px;
    border-top: 1px solid var(--panel-border);
    display: none; flex-direction: column; gap: 12px;
  }
  .task.expanded .task-details { display: flex; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label {
    font-size: 11px; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 0.06em; font-weight: 600;
  }
  .field-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .field-row > div { flex: 1; min-width: 120px; }

  /* Subtasks */
  .subtask-list { display: flex; flex-direction: column; gap: 4px; }
  .subtask {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 0;
  }
  .subtask input[type="text"] { flex: 1; padding: 6px 10px; font-size: 13px; }
  .subtask-check {
    width: 16px; height: 16px; flex-shrink: 0; border-radius: 4px;
    border: 1.5px solid var(--text-dim); background: transparent;
    padding: 0; display: flex; align-items: center; justify-content: center;
  }
  .subtask-check.done { background: var(--success); border-color: var(--success); }
  .subtask-check.done::after { content: "✓"; color: #0b0d12; font-size: 10px; font-weight: bold; }
  .subtask.done input[type="text"] { color: var(--text-dim); text-decoration: line-through; }
  .icon-btn {
    background: transparent; border: none; color: var(--text-dim);
    padding: 6px; border-radius: 6px;
  }
  .icon-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .icon-btn.danger:hover { color: var(--danger); }

  /* Links */
  .link-row { display: flex; gap: 6px; align-items: center; }
  .link-row input { padding: 8px 10px; font-size: 13px; }
  .link-row a {
    color: var(--accent-1); font-size: 13px; word-break: break-all;
    text-decoration: none;
  }
  .link-row a:hover { text-decoration: underline; }
  .link-block { display: flex; flex-direction: column; gap: 2px; }
  .link-logo {
    width: 26px; height: 26px; border-radius: 6px; flex-shrink: 0;
    background: var(--panel-2); object-fit: contain; padding: 2px;
  }
  .link-logo-empty {
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 13px;
  }
  .link-info {
    display: flex; flex-wrap: wrap; gap: 2px 14px;
    font-size: 12px; color: var(--text-dim);
    padding: 2px 2px 6px 34px;
  }
  .link-info a { color: var(--accent-1); text-decoration: none; }
  .link-info a:hover { text-decoration: underline; }
  .link-info-name { color: var(--text); font-weight: 600; }
  .link-info-desc { flex-basis: 100%; color: var(--text-faint); }

  /* Action buttons */
  .action-row { display: flex; gap: 8px; justify-content: flex-end; }
  .btn {
    padding: 8px 14px; border-radius: 8px; font-size: 13px;
    border: 1px solid var(--panel-border); background: var(--panel-2);
    color: var(--text);
  }
  .btn:hover { border-color: var(--accent-1); }
  .btn.danger { color: var(--danger); border-color: rgba(239,68,68,0.3); }
  .btn.danger:hover { background: rgba(239,68,68,0.1); }
  .btn.primary {
    background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
    border: none; color: white; font-weight: 600;
  }

  /* Empty state */
  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--text-dim);
  }
  .empty-state .emoji { font-size: 36px; margin-bottom: 8px; }

  /* Settings panel */
  .settings-section {
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 14px; padding: 16px; margin-bottom: 14px;
  }
  .settings-section h2 {
    margin: 0 0 12px; font-size: 14px; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--text-dim);
  }
  .cat-row {
    display: flex; align-items: center; gap: 8px; padding: 8px 0;
    border-bottom: 1px solid var(--panel-border);
  }
  .cat-row:last-child { border-bottom: none; }
  .cat-row input { flex: 1; padding: 8px 10px; font-size: 13px; }
  .cat-emoji-input { max-width: 60px; text-align: center; flex: 0 0 60px; }
  .cat-parent-select {
    flex: 0 1 180px; max-width: 180px; padding: 7px 8px; font-size: 12px;
    background: var(--panel-2); border: 1px solid var(--panel-border);
    border-radius: 8px; color: var(--text-dim);
  }
  .cat-parent-select:focus { color: var(--text); border-color: var(--accent-1); }
  .nest-indicator {
    color: var(--text-faint); font-size: 14px; margin-right: -2px;
    user-select: none;
  }
  @media (max-width: 540px) {
    .cat-parent-select { flex-basis: 110px; max-width: 110px; }
  }

  /* ====== Mode switcher (To-Do / To-Pay) ====== */
  .mode-switch {
    display: flex; gap: 4px; padding: 4px;
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 999px; margin: 0 auto 14px;
    width: fit-content;
  }
  .mode-btn {
    background: transparent; color: var(--text-dim);
    border: none; padding: 8px 18px; border-radius: 999px;
    font-size: 13px; font-weight: 600;
    transition: background 0.2s, color 0.2s, transform 0.1s;
  }
  .mode-btn:hover { color: var(--text); }
  .mode-btn:active { transform: scale(0.97); }
  .mode-btn.active {
    color: white;
    background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
  }

  /* ====== Bills ====== */
  .bill-summary {
    background: rgba(99,102,241,0.07); border: 1px solid rgba(99,102,241,0.20);
    border-radius: 12px; padding: 12px 14px; margin-bottom: 12px;
    display: flex; gap: 18px; flex-wrap: wrap; font-size: 13px;
    color: var(--text-dim);
  }
  .bill-summary strong {
    color: var(--text); font-variant-numeric: tabular-nums; font-weight: 700;
  }
  .bill {
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 14px; padding: 12px 14px; margin-bottom: 10px;
    transition: border-color 0.15s;
  }
  .bill.paid { opacity: 0.6; }
  .bill.expanded { border-color: rgba(99,102,241,0.35); }
  .bill-head {
    display: flex; align-items: center; gap: 12px;
  }
  .bill-logo {
    width: 44px; height: 44px; border-radius: 10px;
    background: var(--panel-2); flex-shrink: 0;
    object-fit: contain; padding: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; overflow: hidden;
  }
  .bill-logo img { width: 100%; height: 100%; object-fit: contain; }
  .bill-body { flex: 1; min-width: 0; cursor: pointer; }
  .bill-title {
    font-size: 15px; color: var(--text); font-weight: 600;
    word-break: break-word;
  }
  .bill-meta {
    font-size: 12px; color: var(--text-dim); margin-top: 3px;
    display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
  }
  .bill-link-pill {
    display: inline-flex; align-items: center; gap: 7px;
    margin-top: 8px; padding: 8px 15px; width: fit-content;
    background: rgba(99,102,241,0.13); border: 1px solid rgba(99,102,241,0.45);
    border-radius: 999px; color: #c7d2fe; font-size: 14px; font-weight: 700;
    text-decoration: none;
  }
  .bill-link-pill:hover { background: rgba(99,102,241,0.25); }
  .bill-link-pill .arr { font-size: 12px; animation: arrblink 1.1s ease-in-out infinite; }
  @keyframes arrblink { 0%, 100% { opacity: 1; } 50% { opacity: 0.12; } }
  .bill-info-btn {
    width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
    border: 1px solid rgba(99,102,241,0.5); background: rgba(99,102,241,0.16);
    color: #c7d2fe; font-size: 12px; font-weight: 900; padding: 0;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s, background 0.15s;
  }
  .bill-info-btn:hover { border-color: var(--accent-1); background: rgba(99,102,241,0.3); }
  .bill-info-btn .arr-glyph { animation: arrblink 1.1s ease-in-out infinite; line-height: 1; }
  .bill.expanded .bill-info-btn {
    background: rgba(99,102,241,0.35); border-color: rgba(99,102,241,0.75); color: #e0e7ff;
  }
  .bill.expanded .bill-info-btn .arr-glyph { animation: none; }
  .bill-amount {
    font-size: 16px; font-weight: 700; color: var(--text);
    font-variant-numeric: tabular-nums; flex-shrink: 0;
    text-align: right;
  }
  .bill-amount .freq {
    font-size: 11px; color: var(--text-dim); font-weight: 500;
    margin-left: 2px; display: block; margin-top: 1px;
  }
  .bill-pay-btn {
    width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid var(--text-dim); background: transparent;
    padding: 0; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .bill-pay-btn.paid { background: var(--success); border-color: var(--success); }
  .bill-pay-btn.paid::after { content: "✓"; color: #0b0d12; font-weight: bold; font-size: 14px; }
  .bill-details {
    margin-top: 12px; padding-top: 12px;
    border-top: 1px solid var(--panel-border);
    display: none; flex-direction: column; gap: 12px;
  }
  .bill.expanded .bill-details { display: flex; }
  .bill-contact-grid {
    display: grid; grid-template-columns: 110px 1fr;
    gap: 6px 12px; font-size: 13px;
  }
  .bill-contact-grid .label {
    color: var(--text-dim); font-weight: 500;
  }
  .bill-contact-grid .value { color: var(--text); word-break: break-all; }
  .bill-contact-grid a { color: var(--accent-1); text-decoration: none; }
  .bill-contact-grid a:hover { text-decoration: underline; }
  .lookup-spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid var(--text-faint); border-top-color: var(--accent-1);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-left: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .deadline-overdue { color: var(--prio-1); font-weight: 600; }
  .chip-cat { color: var(--text-dim); font-size: 11px; }
  @media (max-width: 540px) {
    .bill-contact-grid { grid-template-columns: 1fr; gap: 2px; }
    .bill-contact-grid .label { margin-top: 6px; }
  }

  /* ====== Share intake wizard ====== */
  .share-overlay {
    position: fixed; inset: 0; z-index: 500;

  .cal-legend {

  @media (max-width: 540px) {

<body>
<div class="container">
  <header class="app-header">
    <div class="app-title-wrap">

  <!-- Family member filter -->
  <nav class="tabs member-tabs" id="member-tabs">
    <button class="tab-member-all active" data-member="all">🌍 Planet Centauri</button>

  <!-- ===== TO-PAY (bills only) ===== -->
  <div id="bills-mode">
    <div class="bill-summary" id="bill-summary">
      <span>Monthly burn: <strong id="bs-monthly">$0</strong></span>
      <span>Due this month: <strong id="bs-due-month">$0</strong></span>

      <button class="tab-today active" data-bill-filter="month">📅 This Month</button>

      <button class="primary" id="bill-qa-add">Add</button>

    <div id="bills-list"></div>
    <div id="bill-calendar"></div>

</div>

<div class="toast" id="toast"></div>
<div id="share-wizard"></div>
<button class="ai-fab" id="ai-fab">✨ Centauri AI</button>
<div id="ai-root"></div>

<!-- ============================================================
     FIREBASE CONFIG — shares the same project as GSD, but uses
     its own "cp_" collections so the two apps never mix data.
     ============================================================ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import {
  getFirestore, collection, doc, addDoc, updateDoc, deleteDoc,
  onSnapshot, query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

// ⬇️ FIREBASE CONFIG ⬇️
const firebaseConfig = {
  apiKey: "AIzaSyBs8jZeW96DsumVVpK1mANVDvg6-LqUILg",
  authDomain: "todo-107e0.firebaseapp.com",
  projectId: "todo-107e0",
  storageBucket: "todo-107e0.firebasestorage.app",
  messagingSenderId: "1001442592988",
  appId: "1:1001442592988:web:1c73371e2a069b4bbd8c19"
};
// ⬆️ END CONFIG ⬆️

const FIREBASE_CONFIGURED = firebaseConfig.apiKey !== "PASTE_API_KEY_HERE";

// CentauriPay's own collections (separate from GSD's)
const COL_TASKS = "cp_tasks";
const COL_CATS = "cp_categories";
const COL_BILLS = "cp_bills";
const COL_BILL_CATS = "cp_bill_categories";

// ----- Family -----
const MEMBERS = [
  { name: "Dreco", emoji: "🪐", cls: "dreco" },
  { name: "Brittany", emoji: "🐻", cls: "brittany" },
  { name: "Annabella", emoji: "🌸", cls: "anabella" },
  { name: "Orion", emoji: "⭐", cls: "orion" }
];
// Parents own tasks & pay bills; the kids are who things are FOR.
const PARENTS = ["Dreco", "Brittany"];
// Legacy alias: anything saved with the old spelling still matches
const fixSpelling = (n) => n === "Anabella" ? "Annabella" : n;
function memberByName(n) { return MEMBERS.find(m => m.name === fixSpelling(n)); }
function memberChip(name) {
  const m = memberByName(name);
  if (!m) return `<span class="member-chip mc-family">🌍 Planet Centauri</span>`;
  return `<span class="member-chip mc-${m.cls}">${m.emoji} ${m.name}</span>`;
}
function forChip(name) {
  const m = memberByName(name);
  if (!m) return "";
  return `<span class="member-chip mc-${m.cls}">for ${m.emoji} ${m.name}</span>`;
}
// Owner select: only the grown-ups (or both)
function ownerOptions(selected) {
  const opts = [`<option value="" ${!selected ? "selected" : ""}>🌍 Planet Centauri (both)</option>`];
  for (const m of MEMBERS.filter(m => PARENTS.includes(m.name))) {
    opts.push(`<option value="${m.name}" ${m.name === selected ? "selected" : ""}>${m.emoji} ${m.name}</option>`);
  }
  return opts.join("");
}
// "For" select: anyone in the family
function forOptions(selected) {
  selected = fixSpelling(selected);
  const opts = [`<option value="" ${!selected ? "selected" : ""}>🌍 Planet Centauri (everyone)</option>`];
  for (const m of MEMBERS) {
    opts.push(`<option value="${m.name}" ${m.name === selected ? "selected" : ""}>${m.emoji} ${m.name}</option>`);
  }
  return opts.join("");
}
// Does this item show under the current member filter?
// A member's pill matches items they own OR items that are for them.
// Untargeted family items show for everyone.
function matchesMember(item) {
  if (memberFilter === "all") return true;
  if (fixSpelling(item.assignee) === memberFilter || fixSpelling(item.forWhom) === memberFilter) return true;
  return !item.assignee && !item.forWhom;
}

const DEFAULT_CATEGORIES = [
  { name: "Home", emoji: "🏠" },
  { name: "School", emoji: "🎒" },
  { name: "Errands", emoji: "🛒" },
  { name: "Family", emoji: "👨‍👩‍👧‍👦" }
];

const DEFAULT_BILL_CATEGORIES = [
  { name: "Utilities", emoji: "⚡" },
  { name: "Phone", emoji: "📱" },
  { name: "Internet", emoji: "🌐" },
  { name: "Streaming", emoji: "📺" },
  { name: "Software", emoji: "💻" },
  { name: "Memberships", emoji: "🎟️" },
  { name: "Insurance", emoji: "🛡️" },
  { name: "Credit Cards", emoji: "💳" },
  { name: "Loans", emoji: "🏦" },
  { name: "Rent / Mortgage", emoji: "🏠" },
  { name: "Auto", emoji: "🚗" },
  { name: "Kids", emoji: "🧸" }
];

// ----- State -----
let app, db;
let mode = "bills"; // bills only — CentauriPay is dedicated to the family's bills
let memberFilter = localStorage.getItem("cp-member") || "all";
let tasks = [];
let categories = [];
let currentFilter = "today";
let expandedId = null;
let bills = [];
let billCategories = [];
let currentBillFilter = "month";
let expandedBillId = null;

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

const todayISO = () => new Date().toISOString().slice(0, 10);
const addDaysISO = (n) => {
  const d = new Date(); d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
};
const fmtDate = (iso) => {
  if (!iso) return "";
  const d = new Date(iso + "T00:00:00");
  if (isNaN(d)) return iso;
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
};

function toast(msg, isError = false) {
  const el = $("#toast");
  el.textContent = msg;
  el.classList.toggle("error", isError);
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2400);
}

function setSyncStatus(state, text) {
  const dot = $("#sync-dot");
  dot.classList.remove("connected", "error");
  if (state === "connected") dot.classList.add("connected");
  if (state === "error") dot.classList.add("error");
  $("#sync-text").textContent = text;
}

// ----- Firebase init -----
if (FIREBASE_CONFIGURED) {
  try {
    app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    setSyncStatus("connecting", "syncing…");
    initSubscriptions();
  } catch (e) {
    console.error(e);
    setSyncStatus("error", "config error");
    toast("Firebase config error: " + e.message, true);
  }
} else {
  $("#setup-notice").style.display = "block";
  setSyncStatus("error", "not configured");
}

function initSubscriptions() {
  // Bill categories
  const billCatsRef = collection(db, COL_BILL_CATS);
  onSnapshot(billCatsRef, async (snap) => {
    billCategories = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (billCategories.length === 0) {
      for (const c of DEFAULT_BILL_CATEGORIES) {
        await addDoc(billCatsRef, { ...c, parentId: null });
      }
    }
    render();
  }, (err) => {
    setSyncStatus("error", "sync error");
    toast("Categories sync error: " + err.message, true);
  });

  // Bills
  const billsRef = query(collection(db, COL_BILLS), orderBy("createdAt", "desc"));
  onSnapshot(billsRef, (snap) => {
    bills = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    setSyncStatus("connected", "synced");
    render();
  }, (err) => {
    setSyncStatus("error", "sync error");
    toast("Bills sync error: " + err.message, true);
  });
}

// ----- Task CRUD -----
async function addTask(title) {
  if (!title.trim()) return;
  if (!FIREBASE_CONFIGURED) return toast("Configure Firebase first", true);
  try {
    await addDoc(collection(db, COL_TASKS), {
      title: title.trim(),
      assignee: PARENTS.includes(memberFilter) ? memberFilter : "",
      forWhom: (memberFilter !== "all" && !PARENTS.includes(memberFilter)) ? memberFilter : "",
      category: categories[0]?.name || "",
      priority: "P3",
      deadline: null,
      status: "open",
      notes: "",
      links: [],
      subtasks: [],
      createdAt: serverTimestamp(),
      updatedAt: serverTimestamp()
    });
  } catch (e) {
    toast("Add failed: " + e.message, true);
  }
}

async function updateTask(id, patch) {
  try {
    await updateDoc(doc(db, COL_TASKS, id), { ...patch, updatedAt: serverTimestamp() });
  } catch (e) {
    toast("Update failed: " + e.message, true);
  }
}

async function deleteTask(t) {
  if (!confirm(`Delete "${t.title}"?`)) return;
  try {
    await deleteDoc(doc(db, COL_TASKS, t.id));
    toast("Deleted");
  } catch (e) {
    toast("Delete failed: " + e.message, true);
  }
}

async function toggleDone(t) {
  await updateTask(t.id, { status: t.status === "done" ? "open" : "done" });
}

// ----- Filter -----
function filterTasks() {
  const today = todayISO();
  const in7 = addDaysISO(7);
  let list = tasks.filter(t => matchesMember(t));
  const isToday = (t) => (t.deadline && t.deadline <= today) || t.priority === "P1";
  if (currentFilter === "today") {
    return list.filter(t => t.status === "open" && isToday(t));
  }
  if (currentFilter === "upcoming") {
    // Everything open that isn't due today — so nothing ever hides
    return list.filter(t => t.status === "open" && !isToday(t));
  }
  if (currentFilter === "done") {
    return list.filter(t => t.status === "done");
  }
  return list;
}

// ----- Render (bills only) -----
function render() {
  // Member pills reflect state
  $$("#member-tabs button").forEach(b =>
    b.classList.toggle("active", b.dataset.member === memberFilter));

  // Settings gear reflects state
  $("#settings-btn").classList.toggle("active", currentBillFilter === "settings");

  $("#member-tabs").style.display = currentBillFilter === "settings" ? "none" : "flex";
  renderBillsView();
}

function renderTasks() {
  const list = filterTasks();
  const root = $("#task-list");
  if (list.length === 0) {
    const who = memberFilter === "all" ? "" : ` for ${memberFilter}`;
    const empty = {
      today: { e: "✨", m: `Nothing for today${who}. Add one above.` },
      upcoming: { e: "🎉", m: `Nothing else coming up${who}. Add a task above.` },
      done: { e: "📥", m: `No completed tasks yet${who}.` }
    }[currentFilter];
    root.innerHTML = `<div class="empty-state"><div class="emoji">${empty.e}</div><div>${empty.m}</div></div>`;
    return;
  }
  const sorted = [...list].sort((a, b) => {
    const pa = parseInt((a.priority||"P3").slice(1));
    const pb = parseInt((b.priority||"P3").slice(1));
    if (pa !== pb) return pa - pb;
    if (!a.deadline) return 1;
    if (!b.deadline) return -1;
    return a.deadline.localeCompare(b.deadline);
  });
  root.innerHTML = sorted.map(taskHtml).join("");
  sorted.forEach(t => bindTaskEvents(t));
}

function taskHtml(t) {
  const isExpanded = expandedId === t.id;
  const isDone = t.status === "done";
  const today = todayISO();
  const p = (t.priority || "P3").toLowerCase();
  let deadlineCls = "";
  if (t.deadline && !isDone) {
    if (t.deadline <= today) deadlineCls = "deadline-warning";
    else if (t.deadline <= addDaysISO(7)) deadlineCls = "deadline-soon";
  }
  const cat = getCatByName(t.category);
  const catLabel = cat ? categoryBreadcrumb(cat) : (t.category || "");
  const subOpen = (t.subtasks || []).filter(s => !s.done).length;
  const subTotal = (t.subtasks || []).length;
  const linkCount = (t.links || []).length;

  return `
  <div class="task ${isExpanded ? 'expanded' : ''} ${isDone ? 'done' : ''}" data-id="${t.id}">
    <div class="task-head">
      <button class="check-btn ${isDone ? 'done' : ''}" data-action="toggle-done"></button>

function bindTaskEvents(t) {
  const root = document.querySelector(`.task[data-id="${t.id}"]`);
  if (!root) return;
  root.querySelectorAll("[data-action]").forEach(el => {
    const action = el.dataset.action;
    if (action === "toggle-done") el.onclick = () => toggleDone(t);
    if (action === "expand") el.onclick = () => { expandedId = expandedId === t.id ? null : t.id; render(); };
    if (action === "collapse") el.onclick = () => { expandedId = null; render(); };
    if (action === "delete") el.onclick = () => deleteTask(t);
    if (action === "edit-title") el.onchange = () => updateTask(t.id, { title: el.value });
    if (action === "edit-assignee") el.onchange = () => updateTask(t.id, { assignee: el.value });
    if (action === "edit-for") el.onchange = () => updateTask(t.id, { forWhom: el.value });
    if (action === "edit-category") el.onchange = () => updateTask(t.id, { category: el.value });
    if (action === "edit-priority") el.onchange = () => updateTask(t.id, { priority: el.value });
    if (action === "edit-deadline") el.onchange = () => updateTask(t.id, { deadline: el.value || null });
    if (action === "edit-notes") el.onblur = () => updateTask(t.id, { notes: el.value });

    if (action === "toggle-sub") el.onclick = () => {
      const idx = parseInt(el.closest("[data-sub-idx]").dataset.subIdx);
      const subs = [...(t.subtasks || [])];
      subs[idx] = { ...subs[idx], done: !subs[idx].done };
      updateTask(t.id, { subtasks: subs });
    };
    if (action === "edit-sub") el.onchange = () => {
      const idx = parseInt(el.closest("[data-sub-idx]").dataset.subIdx);
      const subs = [...(t.subtasks || [])];
      subs[idx] = { ...subs[idx], title: el.value };
      updateTask(t.id, { subtasks: subs });
    };
    if (action === "del-sub") el.onclick = () => {
      const idx = parseInt(el.closest("[data-sub-idx]").dataset.subIdx);
      const subs = (t.subtasks || []).filter((_, i) => i !== idx);
      updateTask(t.id, { subtasks: subs });
    };
    if (action === "add-sub") el.onkeydown = (e) => {
      if (e.key === "Enter" && el.value.trim()) {
        const subs = [...(t.subtasks || []), { title: el.value.trim(), done: false }];
        updateTask(t.id, { subtasks: subs });
        el.value = "";
      }
    };

    if (action === "edit-link-label") el.onchange = () => {
      const idx = parseInt(el.closest("[data-link-idx]").dataset.linkIdx);
      const links = [...(t.links || [])];
      links[idx] = { ...links[idx], label: el.value };
      updateTask(t.id, { links });
    };
    if (action === "edit-link-url") el.onchange = () => {
      const idx = parseInt(el.closest("[data-link-idx]").dataset.linkIdx);
      const links = [...(t.links || [])];
      links[idx] = { ...links[idx], url: el.value };
      updateTask(t.id, { links });
      enrichLinkAt("task", t.id, idx, el.value.trim());
    };
    if (action === "del-link") el.onclick = () => {
      const idx = parseInt(el.closest("[data-link-idx]").dataset.linkIdx);
      const links = (t.links || []).filter((_, i) => i !== idx);
      updateTask(t.id, { links });
    };
    if (action === "add-link") el.onclick = () => {
      const links = [...(t.links || []), { label: "", url: "" }];
      updateTask(t.id, { links });
    };
  });
}

function escapeHtml(s) {
  return String(s || "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

// ----- Category tree helpers -----
function getCatById(id) { return categories.find(c => c.id === id); }
function getCatByName(name) { return categories.find(c => c.name === name); }
function categoryPath(cat) {
  const path = []; let cur = cat; let guard = 0;
  while (cur && guard++ < 12) {
    path.unshift(cur);
    cur = cur.parentId ? getCatById(cur.parentId) : null;
  }
  return path;
}
function categoryDepth(cat) { return Math.max(0, categoryPath(cat).length - 1); }
function getDescendants(catId) {
  const result = new Set(); const queue = [catId];
  while (queue.length) {
    const id = queue.shift();
    for (const c of categories) if (c.parentId === id && !result.has(c.id)) {
      result.add(c.id); queue.push(c.id);
    }
  }
  return result;
}
function sortedCategoriesTree() {
  const result = [];
  function walk(parentId) {
    const children = categories
      .filter(c => (c.parentId || null) === (parentId || null))
      .sort((a, b) => (a.name || "").localeCompare(b.name || ""));
    for (const child of children) { result.push(child); walk(child.id); }
  }
  walk(null);
  for (const c of categories) if (!result.includes(c)) result.push(c);
  return result;
}
function categoryBreadcrumb(cat, sep = " / ") {
  return categoryPath(cat).map(p => `${p.emoji || ""} ${p.name}`.trim()).join(sep);
}

function lastDayOfMonth() {
  const d = new Date(); const end = new Date(d.getFullYear(), d.getMonth()+1, 0);
  return end.toISOString().slice(0, 10);
}
function extractDomain(url) {
  try {
    let u = url.trim();
    if (!/^https?:\/\//i.test(u)) u = "https://" + u;
    const parsed = new URL(u);
    return parsed.hostname.replace(/^www\./, "");
  } catch (e) { return ""; }
}
function advanceDate(iso, frequency) {
  if (!iso) return iso;
  const d = new Date(iso + "T00:00:00");
  if (isNaN(d)) return iso;
  if (frequency === "weekly") d.setDate(d.getDate() + 7);
  else if (frequency === "monthly") d.setMonth(d.getMonth() + 1);
  else if (frequency === "quarterly") d.setMonth(d.getMonth() + 3);
  else if (frequency === "yearly") d.setFullYear(d.getFullYear() + 1);
  return d.toISOString().slice(0, 10);
}

// ----- URL lookup: best-effort favicon + public CORS proxy -----
async function lookupCompany(rawUrl) {
  const result = { logoUrl: "", name: "", description: "", phone: "", email: "", address: "", url: "" };
  const domain = extractDomain(rawUrl);
  if (!domain) return result;
  result.url = "https://" + domain;
  result.logoUrl = "https://www.google.com/s2/favicons?sz=128&domain=" + domain;
  result.name = domain.split(".")[0].replace(/^./, c => c.toUpperCase());
  try {
    const proxy = "https://api.allorigins.win/get?url=" + encodeURIComponent("https://" + domain + "/");
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 8000);
    const r = await fetch(proxy, { signal: ctrl.signal });
    clearTimeout(t);
    if (!r.ok) return result;
    const data = await r.json();
    const html = (data && data.contents) || "";
    if (!html) return result;
    const grab = (re) => { const m = html.match(re); return m ? m[1].trim() : ""; };
    const siteName = grab(/<meta[^>]+property=["']og:site_name["'][^>]+content=["']([^"']+)["']/i);
    const ogTitle = grab(/<meta[^>]+property=["']og:title["'][^>]+content=["']([^"']+)["']/i);
    const ogDesc = grab(/<meta[^>]+property=["']og:description["'][^>]+content=["']([^"']+)["']/i);
    if (siteName) result.name = siteName;
    else if (ogTitle && ogTitle.length < 40) result.name = ogTitle;
    if (ogDesc) result.description = ogDesc.slice(0, 200);

    const telMatch = html.match(/href=["']tel:([+0-9().\-\s]+)["']/i);
    if (telMatch) result.phone = telMatch[1].trim();
    else {
      const phoneRe = /(?:\+?1[-.\s]?)?\(?([0-9]{3})\)?[-.\s]?([0-9]{3})[-.\s]?([0-9]{4})/;
      const pm = html.replace(/<[^>]+>/g, " ").match(phoneRe);
      if (pm) result.phone = pm[0];
    }
    const mailtoMatch = html.match(/href=["']mailto:([^"']+)["']/i);
    if (mailtoMatch) result.email = mailtoMatch[1].split("?")[0];
    else {
      const emailRe = /[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}/g;
      const emails = (html.match(emailRe) || []).filter(e => !/\.(png|jpg|svg|gif|webp)$/i.test(e));
      if (emails.length) result.email = emails[0];
    }
    const addrMatch = html.match(/<address[^>]*>([\s\S]*?)<\/address>/i);
    if (addrMatch) {
      result.address = addrMatch[1].replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim().slice(0, 200);
    }
  } catch (e) { /* swallow — best effort */ }
  return result;
}

// ----- Link enrichment: every added link gets a logo + contact info -----
function faviconFor(url) {
  const domain = extractDomain(url || "");
  return domain ? ("https://www.google.com/s2/favicons?sz=128&domain=" + domain) : "";
}

function linkBlockHtml(l, i) {
  const logo = l.logoUrl || faviconFor(l.url);
  const spinner = l.lookupStatus === "pending" ? `<span class="lookup-spinner" title="Looking up info…"></span>` : "";
  const bits = [];
  if (l.name) bits.push(`<span class="link-info-name">${escapeHtml(l.name)}</span>`);
  if (l.phone) bits.push(`<span>📞 <a href="tel:${escapeHtml(l.phone)}">${escapeHtml(l.phone)}</a></span>`);
  if (l.email) bits.push(`<span>✉️ <a href="mailto:${escapeHtml(l.email)}">${escapeHtml(l.email)}</a></span>`);
  if (l.address) bits.push(`<span>📍 ${escapeHtml(l.address)}</span>`);
  if (l.description) bits.push(`<span class="link-info-desc">${escapeHtml(l.description)}</span>`);
  return `
    <div class="link-block" data-link-idx="${i}">
      <div class="link-row">
        ${logo ? `<img class="link-logo" src="${escapeHtml(logo)}" alt="" onerror="this.style.visibility='hidden'"/>` : `<span class="link-logo link-logo-empty">🔗</span>`}
        <input type="text" placeholder="Label" value="${escapeHtml(l.label || "")}" data-action="edit-link-label" />
        <input type="url" placeholder="https://…" value="${escapeHtml(l.url || "")}" data-action="edit-link-url" />
        ${l.url ? `<a href="${escapeHtml(l.url)}" target="_blank" rel="noopener">↗</a>` : ""}
        ${spinner}
        <button class="icon-btn danger" data-action="del-link">×</button>
      </div>
      ${bits.length ? `<div class="link-info">${bits.join("")}</div>` : ""}
    </div>`;
}

function patchLink(kind, id, idx, url, patch) {
  const item = (kind === "bill" ? bills : tasks).find(x => x.id === id);
  if (!item) return;
  const links = [...(item.links || [])];
  if (!links[idx] || links[idx].url !== url) return; // link changed meanwhile
  links[idx] = { ...links[idx], ...patch };
  if (kind === "bill") updateBill(id, { links }); else updateTask(id, { links });
}

async function enrichLinkAt(kind, id, idx, url) {
  if (!url || !extractDomain(url)) return;
  patchLink(kind, id, idx, url, { logoUrl: faviconFor(url), lookupStatus: "pending" });
  try {
    const info = await lookupCompany(url);
    patchLink(kind, id, idx, url, {
      logoUrl: info.logoUrl || faviconFor(url),
      name: info.name || "",
      phone: info.phone || "",
      email: info.email || "",
      address: info.address || "",
      description: info.description || "",
      lookupStatus: "done"
    });
  } catch (e) {
    patchLink(kind, id, idx, url, { lookupStatus: "failed" });
  }
}

function enrichedLinkFromInfo(url, info) {
  return {
    label: info.name || "Shared link",
    url,
    logoUrl: info.logoUrl || faviconFor(url),
    name: info.name || "",
    phone: info.phone || "",
    email: info.email || "",
    address: info.address || "",
    description: info.description || "",
    lookupStatus: "done"
  };
}

// ----- Bill CRUD -----
async function addBillFromInput(raw) {
  if (!raw || !raw.trim()) return;
  if (!FIREBASE_CONFIGURED) return toast("Configure Firebase first", true);
  const input = raw.trim();
  const looksLikeUrl = /\./.test(input) && !/\s/.test(input);
  const placeholder = {
    company: looksLikeUrl ? extractDomain(input).split(".")[0].replace(/^./, c => c.toUpperCase()) : input,
    url: looksLikeUrl ? ("https://" + extractDomain(input)) : "",
    domain: looksLikeUrl ? extractDomain(input) : "",
    logoUrl: looksLikeUrl ? ("https://www.google.com/s2/favicons?sz=128&domain=" + extractDomain(input)) : "",
    assignee: PARENTS.includes(memberFilter) ? memberFilter : "",
    forWhom: (memberFilter !== "all" && !PARENTS.includes(memberFilter)) ? memberFilter : "",
    category: billCategories[0]?.name || "",
    amount: 0,
    currency: "$",
    frequency: "monthly",
    dueDate: null,
    status: "open",
    accountNumber: "",
    phone: "",
    email: "",
    address: "",
    description: "",
    notes: "",
    links: [],
    lookupStatus: looksLikeUrl ? "pending" : "",
    createdAt: serverTimestamp(),
    updatedAt: serverTimestamp()
  };
  try {
    const ref = await addDoc(collection(db, COL_BILLS), placeholder);
    toast("Added — looking up info…");
    if (looksLikeUrl) {
      lookupCompany(input).then(async (info) => {
        const patch = { lookupStatus: "done", updatedAt: serverTimestamp() };
        if (info.name) patch.company = info.name;
        if (info.logoUrl) patch.logoUrl = info.logoUrl;
        if (info.description) patch.description = info.description;
        if (info.phone) patch.phone = info.phone;
        if (info.email) patch.email = info.email;
        if (info.address) patch.address = info.address;
        try { await updateDoc(doc(db, COL_BILLS, ref.id), patch); } catch (e) {}
      }).catch(() => {
        try { updateDoc(doc(db, COL_BILLS, ref.id), { lookupStatus: "failed" }); } catch (e) {}
      });
    }
  } catch (e) {
    toast("Add bill failed: " + e.message, true);
  }
}

async function deleteBill(b) {
  if (!confirm(`Delete "${b.company}"?`)) return;
  try { await deleteDoc(doc(db, COL_BILLS, b.id)); toast("Deleted"); }
  catch (e) { toast("Delete failed: " + e.message, true); }
}
async function markBillPaid(b) {
  try {
    await updateBill(b.id, { status: "paid", paidAt: new Date().toISOString().slice(0, 10) });
    if (b.frequency && b.frequency !== "once") {
      const next = { ...b };
      delete next.id;
      next.status = "open";
      next.paidAt = "";
      next.dueDate = advanceDate(b.dueDate, b.frequency);
      next.createdAt = serverTimestamp();
      next.updatedAt = serverTimestamp();
      await addDoc(collection(db, COL_BILLS), next);
      toast("Marked paid — next " + b.frequency + " bill created");
    } else {
      toast("Marked paid");
    }
  } catch (e) { toast("Mark paid failed: " + e.message, true); }
}
async function reopenBill(b) {
  await updateBill(b.id, { status: "open", paidAt: "" });
}

// ----- Filtering -----
function filterBills() {
  const monthEnd = lastDayOfMonth();
  const in30 = addDaysISO(30);
  let list = bills.filter(b => matchesMember(b));
  if (currentBillFilter === "month") {
    return list.filter(b => b.status !== "paid" && (!b.dueDate || b.dueDate <= monthEnd));
  }
  if (currentBillFilter === "upcoming") {
    // Every unpaid bill beyond this month — so nothing ever hides
    return list.filter(b => b.status !== "paid" && b.dueDate && b.dueDate > monthEnd);
  }
  if (currentBillFilter === "paid") {
    return list.filter(b => b.status === "paid");
  }
  return list;
}

// ----- Bills render -----
function renderBillsView() {
  const visible = bills.filter(b => matchesMember(b));
  const openBills = visible.filter(b => b.status !== "paid");
  const monthlyBurn = visible
    .filter(b => b.frequency === "monthly" && b.status !== "paid")
    .reduce((s, b) => s + (Number(b.amount) || 0), 0);
  const monthEnd = lastDayOfMonth();
  const dueThisMonth = openBills
    .filter(b => b.dueDate && b.dueDate <= monthEnd)
    .reduce((s, b) => s + (Number(b.amount) || 0), 0);
  $("#bs-monthly").textContent = "$" + monthlyBurn.toFixed(2);
  $("#bs-due-month").textContent = "$" + dueThisMonth.toFixed(2);
  $("#bs-open-count").textContent = openBills.length;

  if (currentBillFilter === "settings") {
    $("#bills-list").style.display = "none";
    $("#bill-quick-add").style.display = "none";
    $("#bill-calendar").style.display = "none";
    $("#bills-settings-view").style.display = "block";
    renderBillsSettings();
  } else {
    $("#bills-list").style.display = "block";

}

// ----- Bill calendar: full month view, auto-synced with the list -----
let calYear = null, calMonth = null;
function renderBillCalendar() {
  const root = $("#bill-calendar");
  if (!root) return;
  const now = new Date();
  if (calYear === null) { calYear = now.getFullYear(); calMonth = now.getMonth(); }
  const first = new Date(calYear, calMonth, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const today = todayISO();
  const monthName = first.toLocaleDateString(undefined, { month: "long", year: "numeric" });

  const visible = bills.filter(b => matchesMember(b) && b.dueDate);
  const byDate = {};
  for (const b of visible) (byDate[b.dueDate] = byDate[b.dueDate] || []).push(b);

  const dows = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  let cells = dows.map(d => `<div class="cal-dow">${d}</div>`).join("");
  for (let i = 0; i < startDow; i++) cells += `<div class="cal-day other"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const iso = `${calYear}-${String(calMonth + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
    const chips = (byDate[iso] || []).map(b => {
      const isPaid = b.status === "paid";
      const st = isPaid ? "s-paid" : (b.dueDate < today ? "s-overdue" : "s-due");
      const label = isPaid ? "Paid ✓" : (b.dueDate < today ? "Overdue" : "Not paid yet");
      const amt = (Number(b.amount) || 0);
      const logo = b.logoUrl
        ? `<img src="${escapeHtml(b.logoUrl)}" alt="" onerror="this.remove()"/>`
        : "";
      return `<div class="cal-bill ${st}" data-cal-bill="${b.id}" title="${escapeHtml(b.company || "Bill")} — ${label} — $${amt.toFixed(2)}">${logo}<span>$${amt % 1 ? amt.toFixed(2) : amt.toFixed(0)}</span></div>`;
    }).join("");
    cells += `<div class="cal-day ${iso === today ? "today" : ""}"><span class="cal-daynum">${d}</span>${chips}</div>`;
  }

  root.innerHTML = `
    <div class="bill-cal">
      <div class="bill-cal-head">
        <button class="btn cal-nav-btn" data-cal-nav="-1" title="Previous month">‹</button>
        <span class="bill-cal-title">📅 ${monthName}</span>
        <button class="btn cal-nav-btn" data-cal-nav="1" title="Next month">›</button>
      </div>
      <div class="cal-grid">${cells}</div>
      <div class="cal-legend">
        <span class="cal-bill s-paid"><span>✓ Paid</span></span>
        <span class="cal-bill s-due"><span>⏳ Not paid yet</span></span>
        <span class="cal-bill s-overdue"><span>⚠ Overdue</span></span>
      </div>
    </div>`;

  root.querySelectorAll("[data-cal-nav]").forEach(btn => btn.onclick = () => {
    calMonth += parseInt(btn.dataset.calNav);
    if (calMonth < 0) { calMonth = 11; calYear--; }
    if (calMonth > 11) { calMonth = 0; calYear++; }
    renderBillCalendar();
  });
  // Tap a bill on the calendar → jump to it in the list, expanded
  root.querySelectorAll("[data-cal-bill]").forEach(chip => chip.onclick = () => {
    const b = bills.find(x => x.id === chip.dataset.calBill);
    if (!b) return;
    expandedBillId = b.id;
    currentBillFilter = b.status === "paid" ? "paid"
      : (b.dueDate && b.dueDate > lastDayOfMonth() ? "upcoming" : "month");
    $$("#bill-tabs button").forEach(x => x.classList.toggle("active", x.dataset.billFilter === currentBillFilter));
    render();
  });
}

function renderBills() {
  const list = filterBills();
  const root = $("#bills-list");
  if (list.length === 0) {
    const who = memberFilter === "all" ? "" : ` for ${memberFilter}`;
    const empty = {
      month: { e: "💸", m: `No bills due this month${who}. Add one above.` },
      upcoming: { e: "📅", m: `Nothing coming up after this month${who}.` },
      paid: { e: "✅", m: `No paid bills yet${who}.` }
    }[currentBillFilter];
    root.innerHTML = `<div class="empty-state"><div class="emoji">${empty.e}</div><div>${empty.m}</div></div>`;
    return;
  }
  const sorted = [...list].sort((a, b) => {
    if (!a.dueDate) return 1;
    if (!b.dueDate) return -1;
    return a.dueDate.localeCompare(b.dueDate);
  });
  root.innerHTML = sorted.map(billHtml).join("");
  sorted.forEach(b => bindBillEvents(b));
}

function billHtml(b) {
  const isExpanded = expandedBillId === b.id;
  const isPaid = b.status === "paid";
  const today = todayISO();
  const overdue = !isPaid && b.dueDate && b.dueDate < today;
  const freqLabel = ({ monthly: "/mo", quarterly: "/qtr", yearly: "/yr", weekly: "/wk", once: "" })[b.frequency] || "";
  const cat = billCategories.find(c => c.name === b.category);
  const catChip = cat ? `<span class="chip-cat">${cat.emoji} ${escapeHtml(cat.name)}</span>` : (b.category ? `<span class="chip-cat">${escapeHtml(b.category)}</span>` : "");
  const lookupSpinner = b.lookupStatus === "pending" ? `<span class="lookup-spinner" title="Looking up info…"></span>` : "";
  let dueText = "";
  if (b.dueDate) {
    const cls = overdue ? "deadline-overdue" : (b.dueDate === today ? "deadline-warning" : "");
    dueText = `<span class="${cls}">📅 ${fmtDate(b.dueDate)}${overdue ? " · overdue" : ""}</span>`;
  } else if (isPaid && b.paidAt) {
    dueText = `<span>paid ${fmtDate(b.paidAt)}</span>`;
  }
  const logoHtml = b.logoUrl
    ? `<div class="bill-logo"><img src="${escapeHtml(b.logoUrl)}" alt="" onerror="this.parentElement.innerHTML='💵'"/></div>`
    : `<div class="bill-logo">💵</div>`;
  const pillUrl = b.url || ((b.links || []).find(l => l.url) || {}).url || "";
  const pillDomain = pillUrl ? (b.domain || extractDomain(pillUrl) || pillUrl) : "";
  const linkPill = pillUrl
    ? `<a class="bill-link-pill" href="${escapeHtml(pillUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🌐 ${escapeHtml(pillDomain)}<span class="arr">↗</span></a>`
    : "";
  return `
    <div class="bill ${isExpanded ? 'expanded' : ''} ${isPaid ? 'paid' : ''}" data-bill-id="${b.id}">
      <div class="bill-head">
        ${logoHtml}
        <div class="bill-body" data-action="expand">
          <div class="bill-title">${escapeHtml(b.company || "Unnamed bill")}${lookupSpinner}</div>
          <div class="bill-meta">
            ${memberChip(b.assignee)}
            ${forChip(b.forWhom)}
            ${catChip}
            ${dueText}
          </div>
          ${linkPill}
        </div>
        <div class="bill-amount">
          ${b.currency || "$"}${(Number(b.amount) || 0).toFixed(2)}
          <span class="freq">${freqLabel}</span>
        </div>
        <button class="bill-info-btn" data-action="expand" title="${isExpanded ? 'Hide details' : 'Show details & edit'}"><span class="arr-glyph">${isExpanded ? '▲' : '▼'}</span></button>
        <button class="bill-pay-btn ${isPaid ? 'paid' : ''}" data-action="toggle-paid" title="${isPaid ? 'Reopen' : 'Mark paid'}"></button>
      </div>
      ${isExpanded ? billDetailsHtml(b) : ""}
    </div>
  `;
}

function bindBillEvents(b) {
  const root = document.querySelector(`.bill[data-bill-id="${b.id}"]`);
  if (!root) return;
  root.querySelectorAll("[data-action]").forEach(el => {
    const action = el.dataset.action;
    if (action === "expand") el.onclick = () => { expandedBillId = expandedBillId === b.id ? null : b.id; render(); };
    if (action === "collapse") el.onclick = () => { expandedBillId = null; render(); };
    if (action === "toggle-paid") el.onclick = (e) => {
      e.stopPropagation();
      if (b.status === "paid") reopenBill(b); else markBillPaid(b);
    };
    if (action === "delete") el.onclick = () => deleteBill(b);
    if (action === "edit-company") el.onchange = () => updateBill(b.id, { company: el.value });
    if (action === "edit-url") el.onchange = () => {
      const url = el.value.trim();
      const domain = extractDomain(url);
      updateBill(b.id, { url, domain, logoUrl: domain ? ("https://www.google.com/s2/favicons?sz=128&domain=" + domain) : "" });
    };
    if (action === "edit-amount") el.onchange = () => updateBill(b.id, { amount: parseFloat(el.value) || 0 });
    if (action === "edit-frequency") el.onchange = () => updateBill(b.id, { frequency: el.value });
    if (action === "edit-due") el.onchange = () => updateBill(b.id, { dueDate: el.value || null });
    if (action === "edit-assignee") el.onchange = () => updateBill(b.id, { assignee: el.value });
    if (action === "edit-for") el.onchange = () => updateBill(b.id, { forWhom: el.value });
    if (action === "edit-category") el.onchange = () => updateBill(b.id, { category: el.value });
    if (action === "edit-description") el.onblur = () => updateBill(b.id, { description: el.value });
    if (action === "edit-account") el.onchange = () => updateBill(b.id, { accountNumber: el.value });
    if (action === "edit-phone") el.onchange = () => updateBill(b.id, { phone: el.value });
    if (action === "edit-email") el.onchange = () => updateBill(b.id, { email: el.value });
    if (action === "edit-address") el.onchange = () => updateBill(b.id, { address: el.value });
    if (action === "edit-notes") el.onblur = () => updateBill(b.id, { notes: el.value });
    if (action === "refetch") el.onclick = async () => {
      if (!b.url) return toast("No URL on this bill", true);
      await updateBill(b.id, { lookupStatus: "pending" });
      const info = await lookupCompany(b.url);
      const patch = { lookupStatus: "done" };
      if (info.logoUrl) patch.logoUrl = info.logoUrl;
      if (info.name && !b.company) patch.company = info.name;
      if (info.description && !b.description) patch.description = info.description;
      if (info.phone && !b.phone) patch.phone = info.phone;
      if (info.email && !b.email) patch.email = info.email;
      if (info.address && !b.address) patch.address = info.address;
      await updateBill(b.id, patch);
      toast("Re-fetched");
    };

    if (action === "edit-link-label") el.onchange = () => {
      const i = parseInt(el.closest("[data-link-idx]").dataset.linkIdx);
      const links = [...(b.links || [])]; links[i] = { ...links[i], label: el.value };
      updateBill(b.id, { links });
    };
    if (action === "edit-link-url") el.onchange = () => {
      const i = parseInt(el.closest("[data-link-idx]").dataset.linkIdx);
      const links = [...(b.links || [])]; links[i] = { ...links[i], url: el.value };
      updateBill(b.id, { links });
      enrichLinkAt("bill", b.id, i, el.value.trim());
    };
    if (action === "del-link") el.onclick = () => {
      const i = parseInt(el.closest("[data-link-idx]").dataset.linkIdx);
      updateBill(b.id, { links: (b.links || []).filter((_, idx) => idx !== i) });
    };
    if (action === "add-link") el.onclick = () => updateBill(b.id, { links: [...(b.links || []), { label: "", url: "" }] });
  });
}

// =====================================================================
// ===== SHARE INTAKE: "Share to → CentauriPay" from iOS / Android ======
// Android: Web Share Target (manifest.json) opens ./?title=&text=&url=
// iOS: a Shortcut in the share sheet opens ./?share=<shared text/url>
// =====================================================================

let shareState = null;

function startShareWizard() {
  const sp = new URLSearchParams(location.search);
  const t = sp.get("title") || "";
  const x = sp.get("text") || sp.get("share") || "";
  let u = sp.get("url") || "";
  if (!u) {
    const m = (x + " " + t).match(/https?:\/\/\S+/);
    if (m) u = m[0];
  }
  let title = (t || x.replace(/https?:\/\/\S+/g, "")).trim();
  if (!title && u) {
    try { title = new URL(u).hostname.replace(/^www\./, ""); } catch (e) {}
  }
  shareState = { mode: "bills", owner: "", title, url: u };
  renderShareStep(1);
}

function closeShareWizard() {
  shareState = null;
  $("#share-wizard").innerHTML = "";
  history.replaceState({}, "", location.pathname);
}

function shareCardOpen(inner, step) {
  $("#share-wizard").innerHTML = `
    <div class="share-overlay">
      <div class="share-card">
        <h3>📥 Add to CentauriPay</h3>
        <div class="share-sub">${escapeHtml(shareState.title || shareState.url || "Shared item")}${shareState.url && shareState.title ? `<br>🔗 ${escapeHtml(shareState.url)}` : ""}</div>
        <div class="share-step-dots">STEP ${step} OF 2</div>
        ${inner}
      </div>
    </div>`;
  const cancel = $("#share-wizard").querySelector("[data-share-cancel]");
  if (cancel) cancel.onclick = closeShareWizard;
}

function renderShareStep(step) {
  const root = $("#share-wizard");
  if (step === 1) {
    shareCardOpen(`
      <div class="share-q">Who pays it?</div>
      <div class="share-opts">
        <button class="share-opt" data-share-owner="">🌍 Planet Centauri — both of us</button>
        <button class="share-opt" data-share-owner="Dreco">🪐 Dreco</button>
        <button class="share-opt" data-share-owner="Brittany">🐻 Brittany</button>
      </div>
      <div class="action-row"><button class="btn" data-share-cancel>Cancel</button></div>
    `, 1);
    root.querySelectorAll("[data-share-owner]").forEach(b => {
      b.onclick = () => { shareState.owner = b.dataset.shareOwner; renderShareStep(2); };
    });
    return;
  }
  // Step 3 — details
  const isBill = shareState.mode === "bills";
  const cats = isBill ? billCategories : categories;
  const catOpts = cats.map(c =>
    `<option value="${escapeHtml(c.name)}">${c.emoji || ""} ${escapeHtml(c.name)}</option>`
  ).join("");
  const billFields = `
    <div class="field-row">
      <div class="field"><label>Amount</label><input type="number" step="0.01" placeholder="0.00" data-sf="amount" /></div>
      <div class="field"><label>Frequency</label>
        <select data-sf="freq">
          <option value="once">One-off</option>
          <option value="weekly">Weekly</option>
          <option value="monthly" selected>Monthly</option>
          <option value="quarterly">Quarterly</option>
          <option value="yearly">Yearly</option>
        </select>
      </div>
      <div class="field"><label>Due date</label><input type="date" data-sf="due" /></div>
    </div>`;
  const taskFields = `
    <div class="field-row">
      <div class="field"><label>Priority</label>
        <select data-sf="prio">
          <option value="P1">P1</option>
          <option value="P2">P2</option>
          <option value="P3" selected>P3</option>
        </select>
      </div>
      <div class="field"><label>Deadline</label><input type="date" data-sf="due" /></div>
    </div>`;
  shareCardOpen(`
    <div class="share-q">A few details and it's in</div>
    <div class="field"><label>${isBill ? "Company / bill name" : "Task"}</label>
      <input type="text" value="${escapeHtml(shareState.title)}" data-sf="title" /></div>
    ${isBill ? billFields : taskFields}
    <div class="field-row">
      <div class="field"><label>For</label><select data-sf="for">${forOptions("")}</select></div>
      <div class="field"><label>Category</label><select data-sf="cat">${catOpts}</select></div>
    </div>
    ${shareState.url ? `<div class="share-sub">🔗 The shared link will be attached automatically.</div>` : ""}
    <div class="action-row">
      <button class="btn" data-share-cancel>Cancel</button>
      <button class="btn primary" data-share-add>Add it</button>
    </div>
  `, 2);
  root.querySelector("[data-share-add]").onclick = submitShareAdd;
}

async function submitShareAdd() {
  if (!FIREBASE_CONFIGURED) return toast("Configure Firebase first", true);
  const s = shareState;
  const get = (name) => $("#share-wizard").querySelector(`[data-sf="${name}"]`);
  const forWhom = get("for").value;
  const category = get("cat") ? get("cat").value : "";
  const title = get("title").value.trim() || s.title || "Shared item";
  try {
    if (s.mode === "bills") {
      const domain = s.url ? extractDomain(s.url) : "";
      const ref = await addDoc(collection(db, COL_BILLS), {
        company: title,
        url: domain ? ("https://" + domain) : "",
        domain,
        logoUrl: domain ? ("https://www.google.com/s2/favicons?sz=128&domain=" + domain) : "",
        assignee: s.owner,
        forWhom,
        category,
        amount: parseFloat(get("amount").value) || 0,
        currency: "$",
        frequency: get("freq").value,
        dueDate: get("due").value || null,
        status: "open",
        accountNumber: "", phone: "", email: "", address: "", description: "", notes: "",
        links: s.url ? [{ label: "Shared link", url: s.url, logoUrl: faviconFor(s.url) }] : [],
        lookupStatus: domain ? "pending" : "",
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });
      if (domain) {
        lookupCompany(s.url).then(async (info) => {
          const patch = { lookupStatus: "done", updatedAt: serverTimestamp() };
          if (info.logoUrl) patch.logoUrl = info.logoUrl;
          if (info.description) patch.description = info.description;
          if (info.phone) patch.phone = info.phone;
          if (info.email) patch.email = info.email;
          if (info.address) patch.address = info.address;
          patch.links = [enrichedLinkFromInfo(s.url, info)];
          try { await updateDoc(doc(db, COL_BILLS, ref.id), patch); } catch (e) {}
        }).catch(() => {
          try { updateDoc(doc(db, COL_BILLS, ref.id), { lookupStatus: "failed" }); } catch (e) {}
        });
      }
      mode = "bills";
    } else {
      const tref = await addDoc(collection(db, COL_TASKS), {
        title,
        assignee: s.owner,
        forWhom,
        category,
        priority: get("prio").value,
        deadline: get("due").value || null,
        status: "open",
        notes: "",
        links: s.url ? [{ label: "Shared link", url: s.url, logoUrl: faviconFor(s.url) }] : [],
        subtasks: [],
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });
      if (s.url && extractDomain(s.url)) {
        lookupCompany(s.url).then(async (info) => {
          try { await updateDoc(doc(db, COL_TASKS, tref.id), { links: [enrichedLinkFromInfo(s.url, info)] }); } catch (e) {}
        }).catch(() => {});
      }
      mode = "todo";
    }
    localStorage.setItem("cp-mode", mode);
    $$("#mode-switch .mode-btn").forEach(b => b.classList.toggle("active", b.dataset.mode === mode));
    closeShareWizard();
    toast("Added 🎉");
    render();
  } catch (e) {
    toast("Add failed: " + e.message, true);
  }
}

// =====================================================================
// ===== CENTAURI AI: talk to your bills (Gemini, key stays on device) =
// =====================================================================
const AI_MODEL = "gemini-2.5-flash";
function getAiKey() { return localStorage.getItem("cp-ai-key") || ""; }
let aiOpen = false;
let aiBusy = false;
let aiChat = [];      // { who: "user"|"bot"|"action", text }
let aiContents = [];  // Gemini conversation history
let aiRec = null;         // active SpeechRecognition instance
let aiRecActive = false;  // true while recording
let aiRecBase = "";       // text that was in the box before recording

const AI_TOOLS = [{
  functionDeclarations: [
    {
      name: "add_bill",
      description: "Add a new bill to CentauriPay",
      parameters: { type: "OBJECT", properties: {
        company: { type: "STRING" },
        amount: { type: "NUMBER" },
        frequency: { type: "STRING", enum: ["once","weekly","monthly","quarterly","yearly"] },
        dueDate: { type: "STRING", description: "YYYY-MM-DD" },
        assignee: { type: "STRING", enum: ["family", "Dreco", "Brittany"], description: "who pays; 'family' = Planet Centauri / both" },
        forWhom: { type: "STRING", enum: ["family", "Dreco", "Brittany", "Annabella", "Orion"], description: "who it's for; 'family' = everyone" },
        category: { type: "STRING" },
        url: { type: "STRING", description: "company website domain if known, e.g. netflix.com" }
      }, required: ["company"] }
    },
    {
      name: "update_bill",
      description: "Update fields on an existing bill; use the bill's id from the bills JSON",
      parameters: { type: "OBJECT", properties: {
        id: { type: "STRING" },
        amount: { type: "NUMBER" },
        dueDate: { type: "STRING", description: "YYYY-MM-DD" },
        frequency: { type: "STRING", enum: ["once","weekly","monthly","quarterly","yearly"] },
        assignee: { type: "STRING", enum: ["family", "Dreco", "Brittany"] },
        forWhom: { type: "STRING", enum: ["family", "Dreco", "Brittany", "Annabella", "Orion"] },
        category: { type: "STRING" },
        notes: { type: "STRING" }
      }, required: ["id"] }
    },
    {
      name: "set_bill_paid",
      description: "Mark a bill paid (recurring bills auto-create the next one) or reopen it",
      parameters: { type: "OBJECT", properties: {
        id: { type: "STRING" },
        paid: { type: "BOOLEAN" }
      }, required: ["id", "paid"] }
    }
  ]
}];

function aiSystemPrompt() {
  const snapshot = bills.map(b => ({
    id: b.id, company: b.company, amount: Number(b.amount) || 0,
    dueDate: b.dueDate || null, frequency: b.frequency || "monthly",
    status: b.status, paidAt: b.paidAt || "",
    assignee: b.assignee || "", forWhom: fixSpelling(b.forWhom) || "",
    category: b.category || ""
  }));
  return "You are Centauri AI, the friendly assistant inside CentauriPay, the Centauri family's shared bills app.\n" +
    "Family: Dreco (dad), Brittany (Mama Bear), kids Annabella and Orion. 'Planet Centauri' means the whole family — use the value 'family' for assignee/forWhom in tools (shown as empty string in the bills JSON).\n" +
    "Today is " + todayISO() + ". Currency is USD.\n" +
    "Current bills JSON: " + JSON.stringify(snapshot) + "\n" +
    "Use the tools to add bills, update them, or mark them paid when the user asks. Resolve relative dates ('the 15th', 'next Friday') into YYYY-MM-DD yourself. Match loosely-named companies to the closest bill in the list. A bill is overdue if unpaid and dueDate is before today.\n" +
    "Keep replies short, warm, and concrete. Never invent bills that aren't in the list. Confirm what you did after using a tool.";
}

async function aiExecTool(name, args) {
  try {
    if (name === "add_bill") {
      const domain = args.url ? extractDomain(args.url) : "";
      await addDoc(collection(db, COL_BILLS), {
        company: args.company || "Unnamed bill",
        url: domain ? "https://" + domain : "",
        domain,
        logoUrl: domain ? faviconFor(args.url) : "",
        assignee: PARENTS.includes(args.assignee) ? args.assignee : "",
        forWhom: (args.forWhom && args.forWhom !== "family") ? fixSpelling(args.forWhom) : "",
        category: args.category || billCategories[0]?.name || "",
        amount: Number(args.amount) || 0,
        currency: "$",
        frequency: args.frequency || "monthly",
        dueDate: args.dueDate || null,
        status: "open",
        accountNumber: "", phone: "", email: "", address: "", description: "", notes: "",
        links: [],
        lookupStatus: "",
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });
      aiChat.push({ who: "action", text: "✓ Added " + (args.company || "bill") + (args.amount ? " — $" + Number(args.amount).toFixed(2) : "") });
      return { ok: true };
    }
    if (name === "update_bill") {
      const b = bills.find(x => x.id === args.id);
      if (!b) return { ok: false, error: "bill not found" };
      const patch = {};
      for (const k of ["amount","dueDate","frequency","assignee","forWhom","category","notes"]) {
        if (args[k] === undefined) continue;
        let v = args[k];
        if (k === "amount") v = Number(v) || 0;
        if ((k === "assignee" || k === "forWhom") && v === "family") v = "";
        if (k === "forWhom") v = fixSpelling(v);
        patch[k] = v;
      }
      await updateBill(args.id, patch);
      aiChat.push({ who: "action", text: "✓ Updated " + b.company });
      return { ok: true };
    }
    if (name === "set_bill_paid") {
      const b = bills.find(x => x.id === args.id);
      if (!b) return { ok: false, error: "bill not found" };
      if (args.paid) await markBillPaid(b); else await reopenBill(b);
      aiChat.push({ who: "action", text: "✓ " + b.company + (args.paid ? " marked paid" : " reopened") });
      return { ok: true };
    }
    return { ok: false, error: "unknown tool" };
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

async function callGemini() {
  const r = await fetch("https://generativelanguage.googleapis.com/v1beta/models/" + AI_MODEL + ":generateContent?key=" + encodeURIComponent(getAiKey()), {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      systemInstruction: { parts: [{ text: aiSystemPrompt() }] },
      contents: aiContents,
      tools: AI_TOOLS
    })
  });
  const j = await r.json();
  if (j.error) throw new Error(j.error.message || ("HTTP " + r.status));
  const cand = j.candidates && j.candidates[0];
  if (!cand || !cand.content) throw new Error("No response from the AI");
  return cand.content;
}

async function aiSend(text) {
  if (!text.trim() || aiBusy) return;
  aiChat.push({ who: "user", text: text.trim() });
  aiContents.push({ role: "user", parts: [{ text: text.trim() }] });
  aiBusy = true;
  renderAiPanel();
  try {
    for (let round = 0; round < 5; round++) {
      const content = await callGemini();
      aiContents.push(content);
      const calls = (content.parts || []).filter(p => p.functionCall);
      const texts = (content.parts || []).filter(p => p.text).map(p => p.text).join("\n").trim();
      if (calls.length === 0) {
        if (texts) aiChat.push({ who: "bot", text: texts });
        break;
      }
      const respParts = [];
      for (const c of calls) {
        const result = await aiExecTool(c.functionCall.name, c.functionCall.args || {});
        respParts.push({ functionResponse: { name: c.functionCall.name, response: result } });
      }
      aiContents.push({ role: "user", parts: respParts });
      renderAiPanel();
    }
  } catch (e) {
    const hint = /key|denied|permission|400|403/i.test(String(e.message)) ? "\nDouble-check the API key (tap 🔑 up top)." : "";
    aiChat.push({ who: "bot", text: "⚠️ " + e.message + hint });
  }
  aiBusy = false;
  renderAiPanel();
}

function renderAiPanel() {
  const root = $("#ai-root");
  if (!aiOpen) { root.innerHTML = ""; return; }

  // First-run: ask for the (free) Gemini key — stored on this device only
  if (!getAiKey()) {
    root.innerHTML = `
      <div class="ai-overlay"><div class="ai-card">
        <div class="ai-head"><span class="ai-title">✨ Centauri AI</span><button class="icon-btn" data-ai-close>✕</button></div>
        <div class="ai-msgs">
          <div class="ai-msg bot">Hi! One-time setup — I need a free Google Gemini API key to think with.

1. Open aistudio.google.com/apikey
2. Sign in → Create API key
3. Copy it and paste it below

The key is saved only on this device — never in the app's code.</div>
        </div>
        <div class="ai-inputbar">
          <input id="ai-key-input" type="password" placeholder="Paste your API key here" />
          <button class="ai-send" id="ai-key-save">Save</button>
        </div>
      </div></div>`;
    root.querySelector("[data-ai-close]").onclick = () => { aiOpen = false; renderAiPanel(); };
    $("#ai-key-save").onclick = () => {
      const v = $("#ai-key-input").value.trim();
      if (!v) return;
      localStorage.setItem("cp-ai-key", v);
      aiChat.push({ who: "bot", text: "Key saved! 🎉 Ask me anything about the family bills, or tell me one to add." });
      renderAiPanel();
    };
    return;
  }

  const msgs = aiChat.map(m => `<div class="ai-msg ${m.who}">${escapeHtml(m.text)}</div>`).join("");
  const hasMic = ("webkitSpeechRecognition" in window) || ("SpeechRecognition" in window);
  root.innerHTML = `
    <div class="ai-overlay"><div class="ai-card">
      <div class="ai-head">
        <span class="ai-title">✨ Centauri AI</span>
        <span>
          <button class="icon-btn" data-ai-key title="Change API key">🔑</button>
          <button class="icon-btn" data-ai-close>✕</button>
        </span>
      </div>
      <div class="ai-msgs" id="ai-msgs">
        ${msgs || `<div class="ai-msg bot">Hey, it's Centauri AI 🌍 I can see all the family bills.

Try:
• "What's due this week?"
• "Add my FPL bill, $180, due the 15th, monthly"
• "Mark Netflix paid"
• "How much do we owe this month?"</div>`}
        ${aiBusy ? `<div class="ai-typing">Centauri AI is thinking…</div>` : ""}
      </div>
      <div class="ai-inputbar">
        ${hasMic ? `<button class="ai-mic ${aiRecActive ? "rec" : ""}" id="ai-mic" title="Tap to record, tap again to stop">🎤</button>` : ""}
        <input id="ai-input" type="text" placeholder="Ask or tell me about a bill…" ${aiBusy ? "disabled" : ""} />
        <button class="ai-send" id="ai-send" ${aiBusy ? "disabled" : ""}>Send</button>
      </div>
      <div class="ai-note">Centauri AI adds and updates real bills — double-check amounts.</div>
    </div></div>`;
  const msgsEl = $("#ai-msgs");
  msgsEl.scrollTop = msgsEl.scrollHeight;
  root.querySelector("[data-ai-close]").onclick = () => { aiOpen = false; renderAiPanel(); };
  root.querySelector("[data-ai-key]").onclick = () => {
    if (confirm("Replace the saved API key on this device?")) {
      localStorage.removeItem("cp-ai-key");
      renderAiPanel();
    }
  };
  const input = $("#ai-input");
  const doSend = () => { const v = input.value; input.value = ""; aiSend(v); };
  $("#ai-send").onclick = doSend;
  if (input) input.onkeydown = (e) => { if (e.key === "Enter") doSend(); };
  const mic = $("#ai-mic");
  if (mic) mic.onclick = () => {
    // Tap while recording → stop; the text stays in the box for you to Send
    if (aiRecActive) {
      aiRecActive = false;
      try { aiRec.stop(); } catch (e) {}
      mic.classList.remove("rec");
      if (input) input.focus();
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return toast("Voice input isn't supported in this browser", true);
    aiRec = new SR();
    aiRec.lang = "en-US";
    aiRec.continuous = true;       // keep listening until tapped again
    aiRec.interimResults = true;   // words appear live in the box
    aiRecBase = input && input.value ? input.value.trim() + " " : "";
    aiRec.onresult = (e) => {
      let finals = "", interim = "";
      for (let i = 0; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) finals += t + " "; else interim += t;
      }
      if (input) input.value = (aiRecBase + finals + interim).replace(/\s+/g, " ").trimStart();
    };
    aiRec.onerror = (e) => {
      aiRecActive = false;
      mic.classList.remove("rec");
      if (e.error === "not-allowed" || e.error === "service-not-allowed") {
        toast("Microphone blocked — allow mic access for this site in your browser settings", true);
      } else if (e.error !== "no-speech" && e.error !== "aborted") {
        toast("Mic error: " + e.error, true);
      }
    };
    aiRec.onend = () => {
      // Engine stopped on its own (long silence) — keep the text, just un-light the button
      aiRecActive = false;
      mic.classList.remove("rec");
    };
    try {
      aiRec.start();
      aiRecActive = true;
      mic.classList.add("rec");
    } catch (e) {
      aiRecActive = false;
      mic.classList.remove("rec");
      toast("Couldn't start the mic: " + e.message, true);
    }
  };
  if (input && !aiBusy) input.focus();
}

$("#ai-fab").onclick = () => { aiOpen = true; renderAiPanel(); };

// Kick off the wizard if we were opened from a share sheet
{
  const sp = new URLSearchParams(location.search);
  if (sp.has("title") || sp.has("text") || sp.has("url") || sp.has("share")) {
    startShareWizard();
  }
}
