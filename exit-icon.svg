<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 268">
  <!-- EXIT sign -->
  <rect x="40" y="10" width="176" height="72" rx="14" fill="#efd9d9"/>
  <rect x="50" y="20" width="156" height="52" rx="9" fill="#d94343" stroke="#1a1214" stroke-width="4"/>
  <text x="128" y="59" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="bold" fill="#f2e4e4" letter-spacing="3">EXIT</text>
  <!-- Door frame -->
  <rect x="62" y="100" width="132" height="160" fill="#efd9d9"/>
  <!-- Dark opening -->
  <rect x="74" y="112" width="54" height="148" fill="#2e2426"/>
  <circle cx="96" cy="150" r="5" fill="#231b1d"/>
  <circle cx="104" cy="205" r="6" fill="#231b1d"/>
  <!-- Open door panel -->
  <polygon points="128,106 198,97 198,252 128,260" fill="#d94343" stroke="#1a1214" stroke-width="4" stroke-linejoin="round"/>
  <ellipse cx="152" cy="135" rx="7" ry="12" fill="#e97070"/>
  <ellipse cx="176" cy="160" rx="6" ry="10" fill="#c13636"/>
  <!-- Handle -->
  <rect x="138" y="172" width="40" height="12" fill="#efd9d9" stroke="#1a1214" stroke-width="3"/>
</svg>
