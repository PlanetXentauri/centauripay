<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 310">
  <!-- soft white base -->
  <rect x="48" y="100" width="428" height="170" rx="62" fill="#f2f2f2"/>
  <!-- dark green side (3D depth) -->
  <rect x="60" y="82" width="404" height="158" rx="56" fill="#2c8a33"/>
  <!-- bright green top face -->
  <rect x="60" y="52" width="404" height="146" rx="56" fill="#3fae4a"/>
  <text x="255" y="148" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="78" font-weight="bold" fill="#ffffff" letter-spacing="6">ENTER</text>
  <!-- click sparks -->
  <g stroke="#1a1a1a" stroke-width="9" stroke-linecap="round">
    <line x1="392" y1="160" x2="373" y2="138"/>
    <line x1="412" y1="152" x2="410" y2="124"/>
    <line x1="378" y1="180" x2="350" y2="176"/>
  </g>
  <!-- cursor -->
  <polygon points="404,172 404,272 429,249 446,288 470,276 453,238 484,234"
           fill="#ffffff" stroke="#1a1a1a" stroke-width="9" stroke-linejoin="round"/>
</svg>
